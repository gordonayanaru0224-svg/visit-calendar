<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>訪問日カレンダー</title>
<style>
:root {
  --green: #2E7D32;
  --green-bg: #E8F5E9;
  --green-bd: #A5D6A7;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --blue: #1565C0;
  --blue-bg: #E3F2FD;
  --gray: #F5F5F5;
  --gray2: #E0E0E0;
  --gray3: #9E9E9E;
  --text: #1A1A1A;
  --text2: #666;
  --border: #E0E0E0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: #EAEFF4;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, #1B5E20, #43A047);
  color: white;
  padding: 18px 16px 14px;
  text-align: center;
}
.header h1 { font-size: 20px; font-weight: 800; }
.header p { font-size: 12px; opacity: .8; margin-top: 2px; }

/* タブバー（画面下固定） */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  background: white;
  border-top: 1px solid var(--border);
  z-index: 200;
  box-shadow: 0 -2px 12px rgba(0,0,0,.08);
}
.tab {
  flex: 1;
  height: 60px;
  border: none;
  background: transparent;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray3);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-family: inherit;
}
.tab .icon { font-size: 22px; line-height: 1; }
.tab.on { color: var(--green); }
.tab.on .icon { transform: scale(1.1); }

/* メインコンテンツ */
.main { padding: 14px; }
.screen { display: none; }
.screen.active { display: block; }

/* カード */
.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,.07);
}
.card-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--green);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--green-bg);
}

/* 園チップ */
.garden-chip {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .15s;
  -webkit-user-select: none;
}
.garden-chip:active { transform: scale(.98); }
.garden-chip.selected { border-color: var(--green); background: var(--green-bg); }
.g-emoji {
  width: 46px; height: 46px;
  border-radius: 12px;
  background: var(--gray);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.garden-chip.selected .g-emoji { background: var(--green-bd); }
.g-name { font-size: 16px; font-weight: 800; }
.g-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* 選択中バー */
.sel-bar {
  background: var(--green-bg);
  border: 1.5px solid var(--green-bd);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.8;
  margin-bottom: 12px;
  display: none;
}

/* カレンダー */
.cal-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 8px rgba(0,0,0,.07);
  margin-bottom: 10px;
}
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #F0F0F0;
}
.cal-nav h2 { font-size: 17px; font-weight: 800; }
.nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--gray);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.nav-btn:active { background: var(--gray2); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-dh {
  text-align: center;
  font-size: 11px;
  font-weight: 800;
  padding: 8px 0;
  color: var(--gray3);
  background: #FAFAFA;
}
.cal-dh.sun { color: #C62828; }
.cal-dh.sat { color: #1565C0; }
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  border-top: 1px solid #F5F5F5;
  position: relative;
  cursor: default;
  -webkit-user-select: none;
}
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.no-visit { color: #CCC; font-weight: 400; font-size: 13px; }
.cal-cell.morning { background: #C62828; color: white; cursor: pointer; }
.cal-cell.afternoon { background: #1565C0; color: white; cursor: pointer; }
.cal-cell.both { background: #2E7D32; color: white; cursor: pointer; }
.cal-cell.morning:active,
.cal-cell.afternoon:active,
.cal-cell.both:active { opacity: .8; }
.cal-cell.today-ring { outline: 3px solid #FF8F00; outline-offset: -3px; border-radius: 4px; }
.cal-cell .sub { font-size: 8px; font-weight: 600; margin-top: 1px; opacity: .9; }

/* 凡例 */
.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px 12px 12px;
  border-top: 1px solid #F5F5F5;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 14px; height: 14px; border-radius: 4px; }

/* フォーム */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.field input[type=text],
.field input[type=number] {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  background: #FAFAFA;
}
.field input:focus { outline: none; border-color: var(--green); background: white; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* 曜日チェック */
.day-checks { display: flex; gap: 8px; flex-wrap: wrap; }
.dc { display: none; }
.dl {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 46px; height: 46px;
  border-radius: 12px;
  border: 2px solid var(--border);
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  color: #BBB;
  background: #FAFAFA;
  -webkit-user-select: none;
}
.dc:checked + .dl { background: var(--green); color: white; border-color: var(--green); }
.dc.ng:checked + .dl { background: var(--red); color: white; border-color: var(--red); }

/* NGブロック */
.ng-block {
  background: #FFF8F8;
  border: 2px solid #FFCDD2;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
.ng-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 800;
  color: var(--red);
}
.btn-del-ng {
  border: none;
  background: var(--red-bg);
  color: var(--red);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 8px;
  font-family: inherit;
}
.btn-add-ng {
  width: 100%;
  height: 48px;
  border: 2px dashed #FFCDD2;
  border-radius: 12px;
  background: transparent;
  color: var(--red);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.btn-add-ng:active { background: #FFF8F8; }

/* ボタン */
.btn-main {
  width: 100%;
  height: 54px;
  border-radius: 14px;
  border: none;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  background: var(--green);
  color: white;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(46,125,50,.3);
}
.btn-main:active { opacity: .85; transform: scale(.98); }
.btn-sub {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: white;
  font-size: 14px;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  margin-top: 8px;
  font-family: inherit;
}
.btn-sub:active { background: var(--gray); }

/* ヒント */
.hint {
  background: var(--blue-bg);
  border: 1.5px solid #90CAF9;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  color: #1A237E;
  margin-bottom: 14px;
  line-height: 1.6;
}
.warn-hint {
  background: #FFF8F8;
  border-left: 4px solid var(--red);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--red);
  margin-bottom: 12px;
  border-radius: 0 8px 8px 0;
  line-height: 1.6;
}

/* モーダル（ボトムシート） */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 500;
  opacity: 0;
  visibility: hidden;
  transition: opacity .25s;
}
.overlay.show { opacity: 1; visibility: visible; }
.sheet {
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 20px 18px 40px;
  width: 100%;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 -4px 32px rgba(0,0,0,.15);
}
.overlay.show .sheet { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px;
  background: var(--gray2);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.sheet h3 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.sheet-sub { font-size: 14px; color: var(--gray3); margin-bottom: 16px; }
.move-box {
  background: var(--gray);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  margin-bottom: 14px;
  line-height: 1.8;
}
.move-ok { color: var(--green); font-weight: 800; }
.move-ng { color: var(--red); font-weight: 800; }
.time-choice {
  display: block;
  width: 100%;
  padding: 18px 18px;
  border-radius: 14px;
  border: 2.5px solid;
  background: #FAFAFA;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
  text-align: left;
  font-family: inherit;
}
.time-choice:active { opacity: .8; }
.time-choice.am { border-color: var(--red); color: var(--red); }
.time-choice.am:active { background: var(--red-bg); }
.time-choice.pm { border-color: var(--blue); color: var(--blue); }
.time-choice.pm:active { background: var(--blue-bg); }
.time-choice:disabled { opacity: .5; cursor: not-allowed; }
.sheet-msg { text-align: center; font-size: 15px; font-weight: 800; min-height: 24px; margin-top: 8px; }
.cancel-btn {
  width: 100%;
  height: 48px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: white;
  font-size: 15px;
  font-weight: 700;
  color: var(--gray3);
  cursor: pointer;
  margin-top: 8px;
  font-family: inherit;
}

/* 編集オーバーレイ */
.edit-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 600;
  opacity: 0;
  visibility: hidden;
  transition: opacity .2s;
}
.edit-overlay.show { opacity: 1; visibility: visible; }
.edit-sheet {
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 20px 18px 40px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.edit-overlay.show .edit-sheet { transform: translateY(0); }

/* 一覧 */
.list-item {
  background: white;
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,.06);
}
.list-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.list-actions { display: flex; gap: 8px; }
.btn-edit {
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid var(--green);
  background: var(--green-bg);
  color: var(--green);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
}
.btn-delete {
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid #FFCDD2;
  background: #FFF8F8;
  color: var(--red);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
}
.ng-tag {
  display: inline-block;
  font-size: 11px;
  color: var(--red);
  background: #FFF8F8;
  border: 1px solid #FFCDD2;
  border-radius: 6px;
  padding: 3px 8px;
  margin: 3px 3px 0 0;
  font-weight: 700;
}

/* 予定一覧 */
.sched-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.btn-del-sched {
  border: none;
  background: #FFF8F8;
  color: var(--red);
  font-size: 20px;
  cursor: pointer;
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.empty-state { text-align: center; padding: 48px 16px; color: #CCC; }
.empty-icon { font-size: 56px; margin-bottom: 14px; }
#save-msg { min-height: 24px; font-size: 15px; text-align: center; margin-top: 12px; font-weight: 800; }
</style>
</head>
<body>

<div class="header">
  <h1>📅 訪問日カレンダー</h1>
  <p>保育所等訪問支援 スケジュール管理</p>
</div>

<div class="main">

<!-- ===== カレンダー ===== -->
<div class="screen active" id="screen-cal">
  <div style="font-size:13px;font-weight:800;color:#888;margin-bottom:10px">▼ 園・学校を選んでください</div>
  <div id="garden-chips"></div>
  <div class="sel-bar" id="sel-bar"></div>
  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="month-label"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-h"></div>
    <div class="cal-grid" id="cal-b"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#C62828"></div>午前だけOK</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1565C0"></div>午後だけOK</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2E7D32"></div>午前・午後OK</div>
    </div>
  </div>
  <div style="text-align:center;font-size:12px;color:#BBB;margin-top:4px">色のついた日をタップして予定を登録</div>
</div>

<!-- ===== 登録フォーム ===== -->
<div class="screen" id="screen-reg">
  <div class="hint">💡 <strong>個人名は入力しません。</strong>園・学校名で管理するので個人情報の心配がありません。</div>
  <div class="card">
    <div class="card-title">🏫 訪問先の情報</div>
    <div class="field"><label>園・学校・事業所の名前 ＊</label><input type="text" id="r-name" placeholder="例：さくら幼稚園"></div>
    <div class="field"><label>住所（任意）</label><input type="text" id="r-addr" placeholder="例：高知市帯屋町1-1-1"></div>
    <div class="field"><label>🚗 事務所からの移動時間（分）＊</label><input type="number" id="r-travel" placeholder="例：20" min="1" max="120" inputmode="numeric"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 訪問できる曜日と時間</div>
    <div class="field">
      <label>受け入れ可能な曜日 ＊（タップして選ぶ）</label>
      <div class="day-checks" id="r-days">
        <input class="dc" type="checkbox" id="d月" value="月"><label class="dl" for="d月">月</label>
        <input class="dc" type="checkbox" id="d火" value="火"><label class="dl" for="d火">火</label>
        <input class="dc" type="checkbox" id="d水" value="水"><label class="dl" for="d水">水</label>
        <input class="dc" type="checkbox" id="d木" value="木"><label class="dl" for="d木">木</label>
        <input class="dc" type="checkbox" id="d金" value="金"><label class="dl" for="d金">金</label>
      </div>
    </div>
    <div class="field">
      <label>🌅 午前の受け入れ時間（ない場合は空白）</label>
      <div class="time-row">
        <input type="text" id="r-am-s" placeholder="開始 例：09:30" inputmode="numeric">
        <input type="text" id="r-am-e" placeholder="終了 例：11:00" inputmode="numeric">
      </div>
    </div>
    <div class="field">
      <label>🌇 午後の受け入れ時間（ない場合は空白）</label>
      <div class="time-row">
        <input type="text" id="r-pm-s" placeholder="開始 例：14:00" inputmode="numeric">
        <input type="text" id="r-pm-e" placeholder="終了 例：15:30" inputmode="numeric">
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🚫 児発・放デイの利用情報</div>
    <div class="warn-hint">この曜日・時間帯はカレンダーで訪問NGとして表示されます。複数登録できます。</div>
    <div id="ng-list"></div>
    <button class="btn-add-ng" onclick="addNgRow('ng-list','ng')">＋ 児発・放デイの事業所を追加する</button>
  </div>
  <button class="btn-main" onclick="saveGarden()">💾　登録する</button>
  <button class="btn-sub" onclick="clearForm()">入力をクリア</button>
  <div id="save-msg"></div>
</div>

<!-- ===== 一覧・修正 ===== -->
<div class="screen" id="screen-list">
  <div class="hint">✏️ 修正ボタンで情報を変更できます。削除すると登録済みの予定も消えます。</div>
  <div id="list-body"></div>
</div>

<!-- ===== 登録済み予定 ===== -->
<div class="screen" id="screen-sched">
  <div class="hint">登録した訪問予定の一覧です。✕ を押すと予定が削除されカレンダーに候補日が復活します。</div>
  <div id="sched-body"></div>
</div>

</div><!-- /main -->

<!-- タブバー -->
<div class="tabbar">
  <button class="tab on" onclick="goTab('cal',this)"><span class="icon">🗓</span>カレンダー</button>
  <button class="tab" onclick="goTab('reg',this)"><span class="icon">➕</span>園を登録</button>
  <button class="tab" onclick="goTab('list',this)"><span class="icon">🏫</span>一覧・修正</button>
  <button class="tab" onclick="goTab('sched',this)"><span class="icon">📋</span>予定一覧</button>
</div>

<!-- 訪問登録ボトムシート -->
<div class="overlay" id="modal" onclick="bgClose(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="m-title"></h3>
    <div class="sheet-sub" id="m-sub"></div>
    <div id="m-move" style="display:none" class="move-box"></div>
    <div id="m-btns"></div>
    <div class="sheet-msg" id="m-msg"></div>
    <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<!-- 編集ボトムシート -->
<div class="edit-overlay" id="edit-overlay" onclick="bgCloseEdit(event)">
  <div class="edit-sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:800;color:var(--green);margin-bottom:16px">✏️ 情報を修正する</div>
    <div id="edit-form-body"></div>
    <button class="btn-main" style="margin-top:8px" onclick="saveEdit()">💾　保存する</button>
    <button class="btn-sub" onclick="closeEdit()">キャンセル</button>
    <div id="edit-msg" style="min-height:22px;font-size:14px;text-align:center;margin-top:10px;font-weight:800"></div>
  </div>
</div>

<script>
var DB=[]; var REG={};
try{DB=JSON.parse(localStorage.getItem('vm_db')||'[]');}catch(e){}
try{REG=JSON.parse(localStorage.getItem('vm_reg')||'{}');}catch(e){}
var SEL=null;
var UI={y:new Date().getFullYear(),m:new Date().getMonth()};
var DJ=['日','月','火','水','木','金','土'];
var PND=null;
var editingId=null;
var ngCount=0;
var EMOJI=['🌸','🌻','☁️','🎒','🌈','⭐','🎠','🌺','🏡','🎨','🌿','🍀'];

function svDB(){try{localStorage.setItem('vm_db',JSON.stringify(DB));}catch(e){}}
function svReg(){try{localStorage.setItem('vm_reg',JSON.stringify(REG));}catch(e){}}
function v(id){var e=document.getElementById(id);return e?(e.value||'').trim():'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pT(s){if(!s)return null;var m=s.match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null;}
function fM(m){return(''+Math.floor(m/60)).padStart(2,'0')+':'+(''+m%60).padStart(2,'0');}
function fD(d){return d.getFullYear()+'/'+(''+(d.getMonth()+1)).padStart(2,'0')+'/'+(''+(d.getDate())).padStart(2,'0');}
function gC(gid){var r=[];document.querySelectorAll('#'+gid+' .dc:checked').forEach(function(c){r.push(c.value);});return r;}

/* ── タブ ── */
function goTab(id,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('screen-'+id).classList.add('active');
  btn.classList.add('on');
  if(id==='cal'){renderChips();renderCal();}
  if(id==='list'){renderList();}
  if(id==='sched'){renderSched();}
}

/* ── NGブロック ── */
function addNgRow(cid,pfx){
  ngCount++;
  var i=ngCount;
  var div=document.createElement('div');
  div.className='ng-block';div.id=pfx+'-row-'+i;
  div.innerHTML='<div class="ng-head"><span>🚫 事業所 '+i+'</span>'
    +'<button class="btn-del-ng" onclick="removeNg(\''+pfx+'-row-'+i+'\')">✕ 削除</button></div>'
    +'<div class="field"><label>事業所の名前（任意）</label><input type="text" id="'+pfx+'-name-'+i+'" placeholder="例：ぐるんぱ児発"></div>'
    +'<div class="field"><label>利用している曜日</label>'
    +'<div class="day-checks" id="'+pfx+'-days-'+i+'">'
    +'<input class="dc ng" type="checkbox" id="'+pfx+i+'月" value="月"><label class="dl" for="'+pfx+i+'月">月</label>'
    +'<input class="dc ng" type="checkbox" id="'+pfx+i+'火" value="火"><label class="dl" for="'+pfx+i+'火">火</label>'
    +'<input class="dc ng" type="checkbox" id="'+pfx+i+'水" value="水"><label class="dl" for="'+pfx+i+'水">水</label>'
    +'<input class="dc ng" type="checkbox" id="'+pfx+i+'木" value="木"><label class="dl" for="'+pfx+i+'木">木</label>'
    +'<input class="dc ng" type="checkbox" id="'+pfx+i+'金" value="金"><label class="dl" for="'+pfx+i+'金">金</label>'
    +'</div></div>'
    +'<div class="field"><label>利用時間（空白なら終日NG）</label>'
    +'<div class="time-row">'
    +'<input type="text" id="'+pfx+'-s-'+i+'" placeholder="開始 例：10:00" inputmode="numeric">'
    +'<input type="text" id="'+pfx+'-e-'+i+'" placeholder="終了 例：11:30" inputmode="numeric">'
    +'</div></div>';
  document.getElementById(cid).appendChild(div);
}
function removeNg(id){var e=document.getElementById(id);if(e)e.remove();}
function collectNg(cid,pfx){
  var rows=[];
  document.querySelectorAll('#'+cid+' .ng-block').forEach(function(el){
    var m=el.id.match(/\d+$/);if(!m)return;
    var i=m[0];
    var days=[];el.querySelectorAll('.dc:checked').forEach(function(c){days.push(c.value);});
    var name=(document.getElementById(pfx+'-name-'+i)||{}).value||'';
    var s=(document.getElementById(pfx+'-s-'+i)||{}).value||'';
    var e2=(document.getElementById(pfx+'-e-'+i)||{}).value||'';
    if(days.length)rows.push({name:name.trim(),days:days,time:(s.trim()&&e2.trim())?s.trim()+'-'+e2.trim():null});
  });
  return rows;
}

/* ── 登録 ── */
function saveGarden(){
  var name=v('r-name'),addr=v('r-addr'),travel=parseInt(v('r-travel'))||0;
  var days=gC('r-days'),amS=v('r-am-s'),amE=v('r-am-e'),pmS=v('r-pm-s'),pmE=v('r-pm-e');
  var ngList=collectNg('ng-list','ng');
  if(!name){alert('園・事業所の名前を入力してください');return;}
  if(!days.length){alert('受け入れ可能な曜日を選んでください');return;}
  if(!travel){alert('移動時間（分）を入力してください');return;}
  if(!amS&&!amE&&!pmS&&!pmE){alert('午前か午後の受け入れ時間を入力してください');return;}
  DB.push({id:Date.now(),name:name,addr:addr,travel:travel,days:days,
    morning:(amS&&amE)?amS+'-'+amE:null,
    afternoon:(pmS&&pmE)?pmS+'-'+pmE:null,
    ngList:ngList,emoji:EMOJI[DB.length%EMOJI.length]});
  svDB();
  document.getElementById('save-msg').innerHTML='<span style="color:var(--green)">✅ '+esc(name)+'を登録しました！</span>';
  clearForm();
  setTimeout(function(){document.getElementById('save-msg').innerHTML='';},2500);
}

function clearForm(){
  ['r-name','r-addr','r-travel','r-am-s','r-am-e','r-pm-s','r-pm-e'].forEach(function(id){
    var e=document.getElementById(id);if(e)e.value='';
  });
  document.querySelectorAll('#r-days .dc').forEach(function(c){c.checked=false;});
  document.getElementById('ng-list').innerHTML='';
  ngCount=0;
}

/* ── 削除・修正 ── */
function deleteGarden(id){
  if(!confirm('この園を削除しますか？\n登録済みの訪問予定も一緒に削除されます。'))return;
  DB=DB.filter(function(g){return g.id!==id;});
  Object.keys(REG).forEach(function(k){if(k.indexOf('-'+id)!==-1)delete REG[k];});
  svDB();svReg();
  if(SEL&&SEL.id===id)SEL=null;
  renderList();renderChips();renderCal();
}

    +'</div>'

    +'<div class="field"><label>🌅 午前</label><div class="time-row">'
    +'<input type="text" id="ed-am-s" value="'+esc(amP[0])+'" placeholder="開始" inputmode="numeric">'

function saveEdit(){
  var g=DB.find(function(x){return x.id===editingId;});if(!g)return;
  var name=v('ed-name'),addr=v('ed-addr'),travel=parseInt(v('ed-travel'))||0;
  var days=gC('ed-days'),amS=v('ed-am-s'),amE=v('ed-am-e'),pmS=v('ed-pm-s'),pmE=v('ed-pm-e');
  var ngList=collectNg('en-list','en');
  if(!name){alert('名前は必須です');return;}
  if(!days.length){alert('受け入れ曜日を選んでください');return;}
  if(!travel){alert('移動時間を入力してください');return;}
  g.name=name;g.addr=addr;g.travel=travel;g.days=days;
  g.morning=(amS&&amE)?amS+'-'+amE:null;
  g.afternoon=(pmS&&pmE)?pmS+'-'+pmE:null;
  g.ngList=ngList;
  svDB();
  if(SEL&&SEL.id===editingId)SEL=g;
  document.getElementById('edit-msg').innerHTML='<span style="color:var(--green)">✅ 保存しました！</span>';
  setTimeout(function(){closeEdit();renderList();renderChips();renderCal();},1000);
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('show');document.getElementById('edit-msg').innerHTML='';editingId=null;}
function bgCloseEdit(e){if(e.target===document.getElementById('edit-overlay'))closeEdit();}

/* ── チップ ── */

  }

    var sel=SEL&&SEL.id===g.id;

      +'<div class="g-emoji">'+g.emoji+'</div>'
      +'<div style="flex:1"><div class="g-name">'+esc(g.name)+'</div>'

function selGarden(id){SEL=DB.find(function(g){return g.id===id;})||null;renderChips();renderCal();}
function renderSelBar(){
  var el=document.getElementById('sel-bar');
  if(!SEL){el.style.display='none';return;}
  var g=SEL,t=[];
  if(g.morning)t.push('🌅 午前: '+g.morning);
  if(g.afternoon)t.push('🌇 午後: '+g.afternoon);
  var ng='';
  if(g.ngList&&g.ngList.length){
    ng='<br>🚫 NG: '+g.ngList.map(function(n){
      return n.days.join('・')+'曜'+(n.time?' '+n.time:'（終日）')+(n.name?' ('+esc(n.name)+')':'');
    }).join('　');
  }
  el.style.display='block';

    +'<br>受入: '+g.days.join('・')+'曜　'+t.join('　')+ng;
}

/* ── カレンダー ── */
function getStatus(g,date){
  var dow=date.getDay();if(dow===0||dow===6)return null;
  var dj=DJ[dow];if(!g.days.includes(dj))return null;
  var ds=fD(date);
  var canAM=!!g.morning&&!REG[ds+'-am-'+g.id];
  var canPM=!!g.afternoon&&!REG[ds+'-pm-'+g.id];
  if(g.ngList&&g.ngList.length){
    g.ngList.forEach(function(n){
      if(!n.days.includes(dj))return;
      if(!n.time){canAM=false;canPM=false;return;}
      var ngS=pT(n.time.split('-')[0]),ngE=pT(n.time.split('-')[1]);
      if(canAM){var aS=pT(g.morning.split('-')[0]),aE=pT(g.morning.split('-')[1]);if(!(aE<=ngS||aS>=ngE))canAM=false;}
      if(canPM){var pS=pT(g.afternoon.split('-')[0]),pE=pT(g.afternoon.split('-')[1]);if(!(pE<=ngS||pS>=ngE))canPM=false;}
    });
  }
  if(canAM&&canPM)return'both';if(canAM)return'morning';if(canPM)return'afternoon';return null;
}
function changeMonth(d){UI.m+=d;if(UI.m>11){UI.m=0;UI.y++;}if(UI.m<0){UI.m=11;UI.y--;}renderCal();}
function renderCal(){
  document.getElementById('month-label').textContent=UI.y+'年'+(UI.m+1)+'月';
  var hEl=document.getElementById('cal-h');hEl.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){
    var e=document.createElement('div');
    e.className='cal-dh'+(i===0?' sun':i===6?' sat':'');
    e.textContent=d;hEl.appendChild(e);
  });
  var body=document.getElementById('cal-b');body.innerHTML='';
  var first=new Date(UI.y,UI.m,1).getDay();
  var last=new Date(UI.y,UI.m+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cal-cell empty';body.appendChild(e);}
  for(var d=1;d<=last;d++){
    var dt=new Date(UI.y,UI.m,d);
    var st=SEL?getStatus(SEL,dt):null;
    var cell=document.createElement('div');
    if(!st){cell.className='cal-cell no-visit';cell.textContent=d;}
    else{
      var cls=st==='both'?'both':st==='morning'?'morning':'afternoon';
      cell.className='cal-cell '+cls;
      var sub=st==='morning'?'午前':st==='afternoon'?'午後':'終日';
      cell.innerHTML='<span>'+d+'</span><span class="sub">'+sub+'</span>';
      (function(x,s){cell.onclick=function(){openModal(x,s);};})(dt,st);
    }
    if(dt.getTime()===today.getTime())cell.classList.add('today-ring');
    body.appendChild(cell);
  }
}

/* ── モーダル ── */
function bgClose(e){if(e.target===document.getElementById('modal'))closeModal();}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function openModal(date,status){
  PND={date:date,status:status};var g=SEL;
  var ds=fD(date),dj=DJ[date.getDay()];
  document.getElementById('m-title').textContent=ds+'（'+dj+'）';
  document.getElementById('m-sub').textContent=g.name+' の訪問予定を登録します';
  document.getElementById('m-msg').textContent='';
  var mi=document.getElementById('m-move');
  var prevEnd=null;
  if(REG[ds+'-am-'+g.id])prevEnd=REG[ds+'-am-'+g.id].end;
  else if(REG[ds+'-pm-'+g.id])prevEnd=REG[ds+'-pm-'+g.id].end;
  if(prevEnd!==null){
    var arr=prevEnd+g.travel;
    var chkT=status==='afternoon'?pT(g.afternoon.split('-')[0]):pT(g.morning.split('-')[0]);
    var ok=chkT>=arr;
    mi.style.display='block';
    mi.innerHTML='前の予定終了: '+fM(prevEnd)+'　🚗 移動 '+g.travel+'分　→　到着: <b>'+fM(arr)+'</b><br>'
      +'<span class="'+(ok?'move-ok':'move-ng')+'">'+(ok?'✅ 間に合います！':'⚠️ 時間が少し厳しいかもしれません')+'</span>';
  }else{mi.style.display='none';}
  var html='';
  if(status==='morning'||status==='both')html+='<button class="time-choice am" onclick="doReg(\'am\')">🌅 午前　'+g.morning+'</button>';
  if(status==='afternoon'||status==='both')html+='<button class="time-choice pm" onclick="doReg(\'pm\')">🌇 午後　'+g.afternoon+'</button>';
  document.getElementById('m-btns').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function doReg(ampm){
  var g=SEL,date=PND.date,ds=fD(date),dj=DJ[date.getDay()];
  var ts=ampm==='am'?g.morning:g.afternoon;
  var pts=ts.split('-'),sM=pT(pts[0]),eM=pT(pts[1]);
  document.querySelectorAll('.time-choice').forEach(function(b){b.disabled=true;});
  document.getElementById('m-msg').innerHTML='<span style="color:#888">⏳ 登録中...</span>';
  REG[ds+'-'+ampm+'-'+g.id]={start:sM,end:eM,gardenName:g.name,date:ds,ampm:ampm,time:ts,day:dj};
  svReg();
  setTimeout(function(){
    document.getElementById('m-msg').innerHTML='<span style="color:var(--green)">✅ 登録しました！</span>';
    setTimeout(function(){closeModal();renderCal();},900);
  },500);
}

/* ── 一覧 ── */
function renderList(){
  var el=document.getElementById('list-body');
  if(!DB.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p style="font-size:15px;color:#CCC">まだ登録されていません</p></div>';return;}
  el.innerHTML=DB.map(function(g){
    var t=[];if(g.morning)t.push('午前: '+g.morning);if(g.afternoon)t.push('午後: '+g.afternoon);
    var ngHtml='';
    if(g.ngList&&g.ngList.length){
      ngHtml='<div style="margin-top:8px">'+g.ngList.map(function(n){
        return'<span class="ng-tag">🚫 '+n.days.join('・')+'曜'+(n.time?' '+n.time:'')+(n.name?' '+esc(n.name):'')+'</span>';
      }).join('')+'</div>';
    }
    return'<div class="list-item">'
      +'<div class="list-head">'
      +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:28px">'+g.emoji+'</span>'
      +'<div style="font-size:17px;font-weight:800">'+esc(g.name)+'</div></div>'
      +'<div class="list-actions">'
      +'<button class="btn-edit" onclick="openEdit('+g.id+')">✏️ 修正</button>'
      +'<button class="btn-delete" onclick="deleteGarden('+g.id+')">🗑 削除</button>'
      +'</div></div>'
      +(g.addr?'<div style="font-size:13px;color:#888;margin-bottom:6px">📍 '+esc(g.addr)+'　🚗 '+g.travel+'分</div>':'')
      +'<div style="font-size:13px;color:#555">受入: '+g.days.join('・')+'曜　'+t.join('　')+'</div>'
      +ngHtml+'</div>';
  }).join('');
}

/* ── 予定一覧 ── */
function renderSched(){
  var el=document.getElementById('sched-body');
  var keys=Object.keys(REG);
  if(!keys.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p style="font-size:15px;color:#CCC">登録済みの予定はありません</p></div>';return;}
  keys.sort(function(a,b){return a<b?-1:1;});
  var html='';
  keys.forEach(function(k){
    var r=REG[k];
    html+='<div class="sched-item">'
      +'<div><div style="font-size:15px;font-weight:800">'+esc(r.date)+'（'+esc(r.day)+'）</div>'
      +'<div style="font-size:13px;margin-top:3px">'+(r.ampm==='am'?'🌅':'🌇')+' '+esc(r.time)+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:2px">🏫 '+esc(r.gardenName)+'</div></div>'
      +'<button class="btn-del-sched" onclick="deleteSched(\''+k+'\')" title="削除">✕</button>'
      +'</div>';
  });
  el.innerHTML=html;
}
function deleteSched(key){
  if(!confirm('この予定を削除しますか？\nカレンダーに候補日として復活します。'))return;
  delete REG[key];svReg();renderSched();renderCal();
}
